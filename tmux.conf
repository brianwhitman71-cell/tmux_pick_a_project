# tmux config for the project switcher.
# The point of the loud left block: you ALWAYS see which project (session)
# you're in, so you stop acting in the wrong one.

set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g focus-events on

# --- status bar -----------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-style "bg=colour234,fg=colour250"

# big high-contrast project name on the left
set -g status-left-length 40
set -g status-left "#[bg=colour202,fg=colour016,bold] #S #[bg=colour234,fg=colour202]#[bg=colour234,fg=colour234]#[default] "

set -g status-right-length 40
set -g status-right "#[fg=colour244]#h#[fg=colour240]  %H:%M "

setw -g window-status-current-style "fg=colour202,bold"
setw -g window-status-style "fg=colour244"

# terminal title shows project:window even when the bar is offscreen
set -g set-titles on
set -g set-titles-string "#S:#W"

# --- keys -----------------------------------------------------------------
# reload config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# popup project picker from inside tmux (tmux 3.2+)
bind p display-popup -E -w 70% -h 60% "~/Projects/tmux/bin/proj"
